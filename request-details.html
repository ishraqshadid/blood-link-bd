<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Request Details - BloodLink BD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="css/style.css" rel="stylesheet"/>
  
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans antialiased min-h-screen transition-colors duration-300 pb-20" data-page="requestDetails">
  <nav class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 px-4 py-3 sticky top-0 z-40 shadow-sm">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <a class="text-slate-600 dark:text-slate-300 hover:text-brand transition text-xl" href="all-requests.html">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <div class="text-brand font-bold text-lg" id="request-details-title">Post Details</div>
      <button class="text-slate-400 dark:text-slate-500 hover:text-brand transition" id="request-share-btn">
        <i class="fa-solid fa-share-nodes text-xl"></i>
      </button>
    </div>
  </nav>

  <main class="max-w-md mx-auto p-4 space-y-6">
    <div id="request-loading" class="premium-card p-8 flex items-center justify-center">
      <div class="loader-ring"></div>
    </div>

    <div id="request-content" class="hidden space-y-6">
      <section class="premium-card p-6 overflow-hidden relative">
        <div id="request-critical-tag" class="absolute top-0 right-0 bg-brand text-white px-4 py-1.5 rounded-bl-2xl text-[10px] font-bold uppercase tracking-widest">Critical Need</div>

        <div class="flex items-center gap-4 mb-6">
          <div id="request-blood-group" class="w-16 h-16 rounded-2xl bg-red-50 dark:bg-red-900/20 text-brand flex items-center justify-center font-black text-2xl border border-red-100 dark:border-red-800/50">--</div>
          <div>
            <h2 id="request-patient-name" class="text-xl font-bold text-slate-900 dark:text-white">Loading...</h2>
            <p id="request-units" class="text-xs text-slate-500 dark:text-slate-400">--</p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-y-4">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 text-xs">
              <i class="fa-solid fa-hospital"></i>
            </div>
            <div>
              <p class="text-[10px] text-slate-400 font-bold uppercase" id="request-hospital-label">Hospital</p>
              <p id="request-hospital" class="text-xs font-bold">--</p>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 text-xs">
              <i class="fa-solid fa-calendar-day"></i>
            </div>
            <div>
              <p class="text-[10px] text-slate-400 font-bold uppercase" id="request-date-label">Date</p>
              <p id="request-date" class="text-xs font-bold">--</p>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 text-xs">
              <i class="fa-solid fa-clock"></i>
            </div>
            <div>
              <p class="text-[10px] text-slate-400 font-bold uppercase" id="request-time-label">Time</p>
              <p id="request-time" class="text-xs font-bold">--</p>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 text-xs">
              <i class="fa-solid fa-location-dot"></i>
            </div>
            <div>
              <p class="text-[10px] text-slate-400 font-bold uppercase" id="request-location-label">Location</p>
              <p id="request-location" class="text-xs font-bold">--</p>
            </div>
          </div>
        </div>
      </section>

      <section class="premium-card p-5">
        <h3 id="request-note-label" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Additional Note</h3>
        <p id="request-note" class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed italic">--</p>
      </section>

      <section class="bg-amber-50 dark:bg-amber-900/10 p-4 rounded-xl border border-amber-100 dark:border-amber-900/30 flex gap-3">
        <i class="fa-solid fa-shield-halved text-amber-500 mt-1"></i>
        <p id="request-safety-text" class="text-[11px] text-amber-800 dark:text-amber-400 leading-normal"><b>Safety Tip:</b> Do not pay anyone money for blood. Genuine donors never ask for payment. If someone asks for money, report the post.</p>
      </section>

      <button id="request-report-btn" class="w-full text-slate-400 dark:text-slate-600 text-[10px] font-bold uppercase tracking-widest hover:text-red-500 transition">
        <i class="fa-solid fa-flag mr-1"></i> Report this post
      </button>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg border-t border-gray-100 dark:border-slate-800 z-40">
    <div class="max-w-md mx-auto flex gap-3">
      <a id="request-call-btn" class="flex-1 bg-brand text-white py-4 rounded-2xl font-bold flex justify-center items-center gap-2 shadow-lg shadow-red-200 dark:shadow-none hover:bg-red-700 transition" href="#">
        <i class="fa-solid fa-phone"></i> Call Contact
      </a>
      <button id="request-message-btn" class="w-14 h-14 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-2xl flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 transition">
        <i class="fa-solid fa-message text-xl"></i>
      </button>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="js/pages/request-details.js"></script>
</body>
</html>
