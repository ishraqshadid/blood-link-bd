<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Blood Posts - BloodLink BD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: '#dc2626' } } } }</script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans antialiased min-h-screen pb-10">
  <nav class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 px-4 py-3 sticky top-0 z-40 shadow-sm">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <a href="index.html" class="text-slate-600 dark:text-slate-300 hover:text-brand transition text-xl"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="font-bold text-lg">My Blood Posts</div>
      <div class="w-5"></div>
    </div>
  </nav>

  <main class="max-w-md mx-auto p-4 pt-6 space-y-4">
    <section class="grid grid-cols-3 gap-3">
      <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-gray-100 dark:border-slate-700 text-center"><p class="text-[10px] uppercase tracking-widest text-slate-400 font-black">Open</p><p id="rq-open" class="text-xl font-black mt-1">--</p></div>
      <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-gray-100 dark:border-slate-700 text-center"><p class="text-[10px] uppercase tracking-widest text-slate-400 font-black">Fulfilled</p><p id="rq-fulfilled" class="text-xl font-black mt-1">--</p></div>
      <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-gray-100 dark:border-slate-700 text-center"><p class="text-[10px] uppercase tracking-widest text-slate-400 font-black">Expired</p><p id="rq-expired" class="text-xl font-black mt-1">--</p></div>
    </section>

    <section class="bg-white dark:bg-slate-800 p-2 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700 grid grid-cols-3 gap-2">
      <button data-tab="open" class="rq-tab bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 px-3 py-3 rounded-xl text-xs font-black">Open</button>
      <button data-tab="fulfilled" class="rq-tab bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 px-3 py-3 rounded-xl text-xs font-black">Fulfilled</button>
      <button data-tab="expired" class="rq-tab bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 px-3 py-3 rounded-xl text-xs font-black">Expired</button>
    </section>

    <div id="my-requests-container" class="space-y-4">
      <div class="text-center py-20"><i class="fa-solid fa-spinner fa-spin text-3xl text-brand"></i><p class="mt-2 text-sm text-slate-500">Fetching your posts...</p></div>
    </div>
  </main>

  <script src="js/script.js"></script>
  <script>
    let currentTab = 'open';
    let requestRows = [];

    function requestStatus(row) {
      if (row.status === 'fulfilled') return 'fulfilled';
      if (!isBloodPostActive(row)) return 'expired';
      return 'open';
    }

    function updateRequestTabUi() {
      document.querySelectorAll('.rq-tab').forEach(btn => {
        const active = btn.dataset.tab === currentTab;
        btn.className = active
          ? 'rq-tab bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 px-3 py-3 rounded-xl text-xs font-black'
          : 'rq-tab bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 px-3 py-3 rounded-xl text-xs font-black';
      });
    }

    function renderRequestStats() {
      document.getElementById('rq-open').innerText = requestRows.filter(row => requestStatus(row) === 'open').length;
      document.getElementById('rq-fulfilled').innerText = requestRows.filter(row => requestStatus(row) === 'fulfilled').length;
      document.getElementById('rq-expired').innerText = requestRows.filter(row => requestStatus(row) === 'expired').length;
    }

    function statusChip(status) {
      if (status === 'fulfilled') return '<span class="bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 px-2.5 py-1 rounded-full text-[10px] font-black border border-green-100 dark:border-green-800/40">Fulfilled</span>';
      if (status === 'expired') return '<span class="bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 px-2.5 py-1 rounded-full text-[10px] font-black border border-amber-100 dark:border-amber-800/40">Expired</span>';
      return '<span class="bg-red-50 dark:bg-red-900/20 text-brand px-2.5 py-1 rounded-full text-[10px] font-black border border-red-100 dark:border-red-800/40">Open</span>';
    }

    function renderRequests() {
      const container = document.getElementById('my-requests-container');
      const filtered = requestRows.filter(row => requestStatus(row) === currentTab);
      if (!filtered.length) {
        container.innerHTML = '<div class="bg-white dark:bg-slate-800 p-10 rounded-3xl border border-dashed border-gray-200 dark:border-slate-700 text-center"><i class="fa-solid fa-folder-open text-4xl text-slate-200 mb-3"></i><h3 class="font-bold text-slate-700 dark:text-white">Nothing here</h3><p class="text-xs text-slate-500 mt-1">No posts in this section.</p></div>';
        return;
      }
      container.innerHTML = filtered.map(req => {
        const state = requestStatus(req);
        const postDate = req.created_at ? new Date(req.created_at).toLocaleString('en-US', { day:'numeric', month:'short', hour:'numeric', minute:'2-digit', hour12:true }) : 'Just now';
        const location = [req.upazila, req.district].filter(Boolean).join(', ');
        return `
          <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700 space-y-4">
            <div class="flex items-start justify-between gap-3">
              <div class="flex items-center gap-3 min-w-0">
                <div class="w-12 h-12 bg-red-50 dark:bg-red-900/20 text-brand rounded-2xl flex items-center justify-center font-black text-xl border border-red-100 dark:border-red-900/30">${req.blood_group || '--'}</div>
                <div class="min-w-0">
                  <h3 class="font-bold text-slate-800 dark:text-white truncate">${req.patient_name || 'Unknown patient'}</h3>
                  <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"><i class="fa-regular fa-clock"></i> ${postDate}</p>
                  ${location ? `<p class="text-[11px] text-slate-500 mt-1 truncate"><i class="fa-solid fa-location-dot text-brand/70"></i> ${location}</p>` : ''}
                </div>
              </div>
              ${statusChip(state)}
            </div>

            <div class="bg-slate-50 dark:bg-slate-900/50 p-3 rounded-2xl text-xs space-y-1 text-slate-600 dark:text-slate-400 font-medium border border-slate-100 dark:border-slate-800">
              <p><i class="fa-solid fa-hospital mr-2 text-brand/50"></i> ${req.hospital_name || 'Hospital not set'}</p>
              <p><i class="fa-solid fa-droplet mr-2 text-brand"></i> ${req.units || 0} Bag(s)</p>
              <p><i class="fa-solid fa-phone mr-2 text-brand/70"></i> ${req.contact_number || 'No contact'}</p>
            </div>

            <div class="grid grid-cols-2 gap-2">
              ${state === 'open' ? `<button onclick="markBloodRequestFulfilled('${req.id}')" class="bg-green-600 text-white py-3 rounded-2xl text-xs font-black">Mark Fulfilled</button>` : `<button onclick="reopenBloodRequest('${req.id}')" class="bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-900 py-3 rounded-2xl text-xs font-black">Reopen</button>`}
              <button onclick="deleteBloodRequest('${req.id}')" class="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-3 rounded-2xl text-xs font-black">Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    async function fetchMyPostsPremium() {
      const container = document.getElementById('my-requests-container');
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
      const { data, error } = await supabaseClient.from('blood_requests').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false });
      if (error) {
        container.innerHTML = `<p class="text-red-500 text-center font-bold">Error: ${error.message}</p>`;
        return;
      }
      requestRows = data || [];
      renderRequestStats();
      updateRequestTabUi();
      renderRequests();
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.rq-tab').forEach(btn => btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        updateRequestTabUi();
        renderRequests();
      }));
      fetchMyPostsPremium();
    });
  </script>
</body>
</html>
