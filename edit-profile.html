<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Profile - BloodLink BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: '#dc2626' } } } }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans antialiased min-h-screen transition-colors duration-300 pb-16">

    <nav class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 px-4 py-3 sticky top-0 z-40 shadow-sm transition-colors duration-300">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <a href="donor-profile.html" class="text-slate-600 dark:text-slate-300 hover:text-brand transition text-xl">
                <i class="fa-solid fa-xmark"></i>
            </a>
            <div class="font-bold text-lg">
                Edit Profile
            </div>
            <div class="w-5"></div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 pt-6">
        <form id="donorForm" class="space-y-5">
            
            <!-- 💥 Avatar Upload Section 💥 -->
            <div class="flex flex-col items-center justify-center mb-2 relative">
                <div class="relative">
                    <img id="edit-avatar-preview" src="https://ui-avatars.com/api/?name=Donor&background=random" class="w-24 h-24 rounded-full border-4 border-white dark:border-slate-800 shadow-md object-cover">
                    <label for="avatarUpload" class="absolute bottom-0 right-0 bg-brand text-white w-8 h-8 rounded-full flex items-center justify-center cursor-pointer shadow-lg border-2 border-white dark:border-slate-800 hover:bg-red-700 transition active:scale-95">
                        <i class="fa-solid fa-camera text-xs"></i>
                    </label>
                    <input type="file" id="avatarUpload" accept="image/jpeg, image/png, image/webp" class="hidden">
                </div>
                <p class="text-[11px] text-slate-400 mt-2 font-medium text-center px-4" id="upload-status">Tap camera to upload profile picture</p>
            </div>

            <!-- Personal Details Box -->
            <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700 space-y-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 dark:border-slate-700 pb-2">Personal Details</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter Full Name" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 p-3 rounded-xl outline-none focus:border-brand transition">
                    </div>
                    <div>
                        <label for="bloodGroup" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">Blood Group</label>
                        <select id="bloodGroup" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 p-3 rounded-xl outline-none focus:border-brand transition">
                            <option value="" disabled selected>Select Group</option>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="phoneNumber" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="01XXXXXXXXX" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 p-3 rounded-xl outline-none focus:border-brand transition">
                    </div>
                    <div>
                        <label for="lastDonation" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">Last Donation</label>
                        <input type="date" id="lastDonation" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 p-3 rounded-xl outline-none focus:border-brand transition">
                    </div>
                </div>
                
                <!-- 💥 Total Donations Input 💥 -->
                <!-- <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">Total Donations (Times)</label>
                    <input type="number" id="totalDonations" min="0" placeholder="e.g. 5" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 p-3 rounded-xl outline-none focus:border-brand transition">
                </div> -->
                <!-- 💥 Bio / About Me Input 💥 -->
                <div class="mt-4">
                    <label for="bio" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">About Me (Optional)</label>
                    <textarea id="bio" rows="3" placeholder="Write a short message (e.g., I am ready to donate blood in emergencies...)" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 p-3 rounded-xl outline-none focus:border-brand transition resize-none"></textarea>
                </div>
            </div>

            <!-- Location Details Box -->
            <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700 space-y-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 dark:border-slate-700 pb-2">Location</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="district" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">District</label>
                        <select id="district" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 p-3 rounded-xl outline-none focus:border-brand transition">
                            <option value="" disabled selected>Loading...</option>
                        </select>
                    </div>
                    <div>
                        <label for="upazila" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">Upazila</label>
                        <select id="upazila" required disabled class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 p-3 rounded-xl outline-none focus:border-brand transition">
                            <option value="" disabled selected>Select Upazila</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" id="btn-save" class="w-full bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-900 p-4 rounded-xl font-bold hover:bg-slate-700 dark:hover:bg-slate-200 transition shadow-md flex justify-center items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> Save & Return
            </button>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
